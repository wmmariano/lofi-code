<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'" />
  <title>lofi-code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="widget">
    <div id="toolbar">
      <span id="status">offline</span>
      <button id="settings-toggle" title="settings">⚙</button>
      <button id="mute" title="mute / unmute">♪</button>
      <button id="close" title="close">×</button>
    </div>
    <canvas id="stage" width="272" height="256"></canvas>
    <div id="volume"></div>
    <div id="start-overlay">click to start the sound</div>

    <div id="settings-panel" class="hidden">
      <div class="settings-row settings-title">
        <span>settings</span>
        <button id="settings-done" title="close">×</button>
      </div>
      <label class="settings-row">skin
        <select id="cfg-skin">
          <option value="purple">purple</option>
          <option value="green">green</option>
          <option value="pink">pink</option>
          <option value="cat">cat</option>
        </select>
      </label>
      <label class="settings-row">engine
        <select id="cfg-engine">
          <option value="samples">samples</option>
          <option value="synth">synth</option>
        </select>
      </label>
      <label class="settings-row">tool voices
        <select id="cfg-tool-voices">
          <option value="on">on</option>
          <option value="off">off</option>
        </select>
      </label>
      <label class="settings-row">key
        <select id="cfg-key">
          <option value="daily">daily</option>
          <option value="0">C</option>
          <option value="1">Db</option>
          <option value="2">D</option>
          <option value="3">Eb</option>
          <option value="4">E</option>
          <option value="5">F</option>
          <option value="6">Gb</option>
          <option value="7">G</option>
          <option value="8">Ab</option>
          <option value="9">A</option>
          <option value="10">Bb</option>
          <option value="11">B</option>
        </select>
      </label>
      <label class="settings-row">volume
        <input type="range" id="cfg-volume" min="0" max="100" step="1" />
      </label>
      <div class="settings-row settings-foot">
        <span id="settings-hint"></span>
        <button id="settings-restart">restart</button>
      </div>
    </div>
  </div>
  <script src="../node_modules/tone/build/Tone.js"></script>
  <script src="audio.js"></script>
  <script src="mascot.js"></script>
  <script src="app.js"></script>
</body>
</html>
